<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LinkedIn Login</title>

<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="logo">Linked<span style="background:#1066bd;color:white;padding:2px 6px;border-radius:4px;">in</span></div>

<div class="container-box">

  <h3>Sign in</h3>
  <p>Stay updated on your professional world</p>

 <input type="email" id="email" placeholder="Email" class="form-control mb-3">


  <div class="position-relative">
   <input type="password" id="password" placeholder="Password" class="form-control mb-3">
    <span onclick="togglePassword()" 
          style="position:absolute; right:10px; top:12px; cursor:pointer; color:#0a66c2;">
      show
    </span>
  </div>

  <a href="#" class="forgot">Forgot password?</a>

 <button onclick="login()" class="btn btn-linkedin w-100 mt-3" type="button">
  Sign in
</button>

</div>

<div class="join">
 New to LinkedIn? <a href="register.html" class="forgot">Join now</a>
</div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
