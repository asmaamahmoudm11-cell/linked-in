<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="logo">
  Linked<span style="background:#0a66c2;color:white;padding:2px 6px;border-radius:4px;">in</span>
</div>

<div class="subtitle">
  Make the most of your professional life
</div>

<div class="box">

  <label>FullName </label>
<input type="text" id="fullName" placeholder="fullName" class="form-control mb-3" required>

  <label>PhoneNumber</label>
<input type="number" id="PhoneNumber" placeholder="PhoneNumber" class="form-control mb-3" required>

  <label>Email</label>
<input type="email" id="email" placeholder="Email" class="form-control mb-3" required>

  <label>Password (6 characters minimum)</label>
  <input type="password" id="password" placeholder="Password" class="form-control mb-3" required>

  <p style="font-size:12px;">
    By clicking Accept and register, you agree to the Terms of Use and Privacy Policy.
  </p>

 <button onclick="registerToLinkedIn()" class="btn btn-main w-100 mb-3">
  Accept and register
</button>

  <div class="text-center mb-2">or</div>



  <div class="text-center">
    Already registered? <a href="login.html">Login</a>
  </div>

</div>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
